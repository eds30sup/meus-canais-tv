    <style>
        body { margin: 0; background: #0a0a0a; font-family: Arial, sans-serif; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* CABEÇALHO */
        .fixo-topo { flex-shrink: 0; z-index: 1000; background: #000; }
        .topo { background: #0f4c81; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; color: #FFD700; border-bottom: 2px solid #1f6fb2; }
        
        /* ÁREA DO PLAYER */
        .player-area { width: 100%; height: 35vh; background: black; position: relative; border-bottom: 3px solid #FFD700; }
        video, iframe { width: 100%; height: 100%; border: 0; display: block; }
        iframe { display: none; background: #000; }

        /* BOTÃO DE DESBLOQUEIO (PLAY) */
        #camadaPop {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; background: rgba(0,0,0,0.7); display: none;
            cursor: pointer; align-items: center; justify-content: center;
        }
        .btn-play-central {
            width: 80px; height: 80px; background: #FFD700; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            transition: transform 0.2s;
        }
        .btn-play-central:active { transform: scale(0.9); }
        .btn-play-central::after {
            content: ''; display: block; margin-left: 8px;
            border-style: solid; border-width: 18px 0 18px 30px;
            border-color: transparent transparent transparent #000;
        }

        /* LISTAGEM */
        .conteudo-rolavel { flex-grow: 1; overflow-y: auto; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        
        .categoria { 
            background: linear-gradient(90deg, #1f6fb2, #0f4c81); 
            padding: 12px 15px; font-size: 15px; font-weight: bold; 
            color: #FFD700; border-left: 6px solid #FFD700; 
            position: sticky; top: 0; z-index: 10; 
        }

        .lista { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }

        .canal { 
            background: #2a2a2a; border-radius: 10px; padding: 12px 5px; 
            text-align: center; color: #FFD700; cursor: pointer; 
            border: 1px solid #444; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 110px; 
            position: relative; overflow: hidden; transition: 0.3s;
        }

        .canal-jogo { background-size: cover; background-position: center; border: 1px solid #ffffff33; }
        
        .overlay-card { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0, 0, 0, 0.65); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 5px; z-index: 1; 
        }

        /* ESTADO ATIVO (CLICADO) */
        .canal.ativo { background: #FFD700 !important; border: 2px solid #fff; transform: scale(0.95); }
        .canal.ativo .nome-txt, .canal.ativo .status-jogo { color: #000 !important; }

        /* TEXTOS */
        .nome-txt { z-index: 2; font-weight: bold; text-shadow: 1px 1px 2px #000; font-size: 13px; margin-top: 5px; }
        .status-jogo { font-size: 13px; font-weight: bold; margin-bottom: 5px; min-height: 16px; z-index: 2; }

        /* ANIMAÇÃO AO VIVO */
        .live-on { color: #ff4444; display: flex; align-items: center; gap: 4px; }
        .dot { height: 7px; width: 7px; background-color: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @media (max-width: 480px) { .player-area { height: 30vh; } .lista { grid-template-columns: repeat(3, 1fr); gap: 8px; } }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    var hls = null;
    var linkAtual = "";

    // ATUALIZAÇÃO AUTOMÁTICA DE STATUS (AO VIVO / AMANHÃ / ENCERRADO)
    function atualizarStatus() {
        const agora = new Date();
        document.querySelectorAll('.canal[data-hora]').forEach(canal => {
            const rawData = canal.getAttribute('data-hora');
            const dataInicio = new Date(rawData);
            const dataFim = new Date(dataInicio.getTime() + (2.5 * 60 * 60 * 1000));
            const statusDiv = canal.querySelector('.status-jogo');
            const horaExibicao = rawData.split('T')[1];

            if (agora >= dataInicio && agora <= dataFim) {
                statusDiv.innerHTML = '<span class="live-on"><span class="dot"></span> AO VIVO</span>';
            } else if (agora > dataFim) {
                statusDiv.innerHTML = '<span style="color:#888888">Encerrado</span>';
            } else {
                const ehAmanha = dataInicio.getDate() > agora.getDate();
                statusDiv.innerHTML = `<span style="color:#00FF00">${ehAmanha ? 'Amanhã' : 'Inicia às'} ${horaExibicao}</span>`;
            }
        });
    }

    atualizarStatus();
    setInterval(atualizarStatus, 30000);

    // FUNÇÃO PARA TROCAR DE CANAL
    function abrir(elemento, link) {
        linkAtual = link;
        var video = document.getElementById("video");
        var iframe = document.getElementById("iframePlayer");
        var camada = document.getElementById("camadaPop");

        // UI: Marca o canal selecionado
        document.querySelectorAll(".canal").forEach(c => c.classList.remove("ativo"));
        elemento.classList.add("ativo");

        // Limpa instâncias anteriores
        if (hls) { hls.destroy(); hls = null; }

        if (link.includes(".m3u8")) {
            // Player Nativo M3U8
            camada.style.display = "none";
            iframe.style.display = "none";
            video.style.display = "block";
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(link);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
            } else { video.src = link; video.play(); }
        } else {
            // Iframe Externo (com trava de pop-up)
            video.pause();
            video.style.display = "none";
            iframe.style.display = "block";
            iframe.src = link;
            camada.style.display = "flex"; // Mostra o Botão Play
        }
    }

    // LÓGICA DO POP-UP
    function gerenciarJanela() {
        // Abre o link em nova aba (satisfaz o site de origem)
        window.open(linkAtual, '_blank');
        // Remove a trava visual do nosso site
        document.getElementById('camadaPop').style.display = 'none';
        // Tenta retornar o foco
        window.focus();
    }
</script>
